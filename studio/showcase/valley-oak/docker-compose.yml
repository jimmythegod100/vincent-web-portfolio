services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    profiles: ["db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-valley}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valley_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-valley_oak}
    volumes:
      - valley_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

volumes:
  valley_pgdata:
